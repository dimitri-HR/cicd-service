# .github/workflows/deploy.yml — POC stage, end of segment 6
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/_build.yml

  deploy:
    environment: production
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::485849268639:role/cicd-service
      - run: aws s3 sync dist/ s3://youcode-cicd-service-485849268639-us-east-1-an/ --delete
